<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching: {{ video.title }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#fcfaf7',
                        'cream-border': '#ede6db',
                        terra: '#e8704a',
                        'terra-dark': '#d15d38',
                        'terra-light': '#fdf2ee',
                        ink: '#1c1917',
                        'ink-soft': '#57534e',
                        'ink-muted': '#a8a29e',
                    },
                    boxShadow: {
                        'premium': '0 4px 20px -2px rgba(28, 25, 23, 0.03), 0 2px 8px -1px rgba(28, 25, 23, 0.02)',
                        'floating': '0 12px 30px -4px rgba(232, 112, 74, 0.08), 0 4px 12px -2px rgba(232, 112, 74, 0.04)',
                    }
                }
            }
        }
    </script>

    <style>
        /* CRITICAL: Strips native HTML5 player control bars to prevent visual clashing */
        video::-webkit-media-controls { display: none !important; }
        video::-webkit-media-controls-enclosure { display: none !important; }
    </style>
</head>
<body class="bg-[#fcfaf7] text-ink antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-5xl mx-auto p-5 bg-white rounded-2xl shadow-floating border border-cream-border space-y-5">
        
        <div class="flex items-start justify-between border-b border-cream-border pb-4">
            <div>
                <h1 class="text-xl font-black text-ink tracking-tight">{{ video.title }}</h1>
                <p class="text-[11px] text-ink-muted mt-0.5 font-medium">
                    Status: <span class="text-emerald-600 font-bold">● {{ video.status }}</span> • 
                    Views: <span class="font-mono text-ink-soft">{{ video.views }} clicks</span>
                </p>
            </div>
            <a href="{{ url_for('dashboard') }}" class="px-3 py-1.5 bg-cream hover:bg-cream-border/60 border border-cream-border text-ink-soft rounded-xl text-xs font-bold transition-colors flex items-center gap-1">
                <i class="bi bi-arrow-left"></i> Back Studio
            </a>
        </div>

        <div id="video-container" class="relative bg-black rounded-xl overflow-hidden shadow-2xl w-full aspect-video group select-none">
            
            <video id="custom-html5-player" class="w-full h-full object-contain" preload="metadata">
                <source src="{{ video.video_url }}" type="application/x-mpegURL">
            </video>

            <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent pt-20 pb-4 px-4 flex flex-col gap-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10">
                
                <div class="relative w-full h-1 bg-white/30 rounded-full cursor-pointer group/timeline hover:h-1.5 transition-all" id="timeline-rail">
                    <div id="timeline-buffered" class="absolute h-full bg-white/20 rounded-full left-0 top-0 w-0"></div>
                    <div id="timeline-progress" class="absolute h-full bg-red-600 rounded-full left-0 top-0 w-0 flex justify-end items-center">
                        <span class="absolute w-3 h-3 bg-red-600 rounded-full scale-0 group-hover/timeline:scale-100 transition-transform shadow-md"></span>
                    </div>
                </div>

                <div class="flex items-center justify-between text-white text-lg">
                    
                    <div class="flex items-center gap-5">
                        <button id="btn-play-pause" class="hover:text-red-500 transition-colors focus:outline-none">
                            <i class="bi bi-play-fill text-2xl"></i>
                        </button>

                        <button id="btn-skip-back" class="hover:text-stone-300 transition-colors focus:outline-none" title="Rewind 10s">
                            <i class="bi bi-skip-backward-fill text-base"></i>
                        </button>

                        <button id="btn-skip-forward" class="hover:text-stone-300 transition-colors focus:outline-none" title="Forward 10s">
                            <i class="bi bi-skip-forward-fill text-base"></i>
                        </button>

                        <div class="flex items-center gap-2 group/volume">
                            <button id="btn-mute" class="hover:text-stone-300 transition-colors focus:outline-none">
                                <i class="bi bi-volume-up-fill text-xl"></i>
                            </button>
                            <br>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1"
                                   class="w-0 group-hover/volume:w-16 h-1 bg-white/30 rounded-full appearance-none accent-white cursor-pointer transition-all duration-300 focus:outline-none">
                        </div>

                        <div class="text-[11px] font-medium tracking-wide text-stone-300 font-mono">
                            <span id="time-current">0:00</span> / <span id="time-total">0:00</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 text-base">
                        <button class="hover:text-stone-300 transition-colors opacity-60 cursor-not-allowed"><i class="bi bi-subtitle-left"></i></button>
                        
                        <button id="btn-settings-gear" class="hover:text-red-500 transition-all duration-300 focus:outline-none">
                            <i class="bi bi-gear-fill"></i>
                        </button>
                        
                        <button id="btn-fullscreen" class="hover:text-red-500 transition-colors focus:outline-none"><i class="bi bi-fullscreen"></i></button>
                    </div>

                </div>
            </div>

            <div id="settings-menu" class="absolute right-4 bottom-16 bg-stone-900/95 backdrop-blur-md border border-stone-800 text-stone-200 text-xs rounded-xl p-2 w-44 flex flex-col gap-1 hidden shadow-floating z-20">
                <p class="text-[10px] font-bold text-stone-500 uppercase px-2 py-1 tracking-wider border-b border-stone-800) mt-1">Playback Speed</p>
                <button class="speed-opt text-left px-2 py-1.5 rounded-lg hover:bg-white/10 transition-colors font-medium flex justify-between items-center" data-speed="0.5"><span>0.5x</span></button>
                <button class="speed-opt text-left px-2 py-1.5 rounded-lg hover:bg-white/10 transition-colors font-medium flex justify-between items-center bg-red-600/20 text-red-400" data-speed="1.0"><span>Normal</span> <i class="bi bi-check-lg"></i></button>
                <button class="speed-opt text-left px-2 py-1.5 rounded-lg hover:bg-white/10 transition-colors font-medium flex justify-between items-center" data-speed="1.5"><span>1.5x</span></button>
                <button class="speed-opt text-left px-2 py-1.5 rounded-lg hover:bg-white/10 transition-colors font-medium flex justify-between items-center" data-speed="2.0"><span>2.0x</span></button>
                
                <p class="text-[10px] font-bold text-stone-500 uppercase px-2 py-1 tracking-wider border-b border-stone-800 mt-1">Options Package</p>
                <a href="{{ url_for('download_video', video_id=video.id) }}" 
                   class="text-left px-2 py-2 rounded-lg hover:bg-white/10 text-emerald-400 hover:text-emerald-300 transition-colors font-bold flex items-center gap-2">
                    <i class="bi bi-cloud-arrow-down-fill text-sm"></i>
                    <span>Download MP4</span>
                </a>
            </div>
        </div>

        <div class="p-3 bg-stone-900 border border-stone-800 rounded-xl font-mono text-[10px] text-stone-400 space-y-1">
            
            
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Core DOM container handles references target tracking matrix variables
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('custom-html5-player');
            
            // Interaction Elements Captures
            const playPauseBtn = document.getElementById('btn-play-pause');
            const skipBackBtn = document.getElementById('btn-skip-back');
            const skipForwardBtn = document.getElementById('btn-skip-forward');
            const muteBtn = document.getElementById('btn-mute');
            const volumeSlider = document.getElementById('volume-slider');
            const fullscreenBtn = document.getElementById('btn-fullscreen');
            const gearBtn = document.getElementById('btn-settings-gear');
            const settingsMenu = document.getElementById('settings-menu');
            
            // Progress Track Component Element Nodes Reference Mappings
            const timelineRail = document.getElementById('timeline-rail');
            const progressIndicator = document.getElementById('timeline-progress');
            const bufferedIndicator = document.getElementById('timeline-buffered');
            const timeCurrentText = document.getElementById('time-current');
            const timeTotalText = document.getElementById('time-total');

            // 1. PLAY & PAUSE LOGIC PIPELINE
            function togglePlay() {
                if (video.paused) {
                    video.play();
                    playPauseBtn.innerHTML = '<i class="bi bi-pause-fill text-2xl"></i>';
                } else {
                    video.pause();
                    playPauseBtn.innerHTML = '<i class="bi bi-play-fill text-2xl"></i>';
                }
            }
            playPauseBtn.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay); // Allows clicking directly on screen window to pause

            // 2. TIMESTRING FORMATTER (Converts total running float seconds values into standard 0:00 notation scales)
            function formatTime(secs) {
                const minutes = Math.floor(secs / 60);
                const seconds = Math.floor(secs % 60);
                return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            }

            // Once video meta assets parse down successfully, append full duration markers inside counter
            video.addEventListener('loadedmetadata', () => {
                timeTotalText.textContent = formatTime(video.duration);
            });

            // 3. LIVE RUNTIME PROGRESS TRAIL ACCENT FILL MATRIX SLIDERS
            video.addEventListener('timeupdate', () => {
                const progressRatio = video.currentTime / video.duration;
                progressIndicator.style.width = `${progressRatio * 100}%`;
                timeCurrentText.textContent = formatTime(video.currentTime);

                // Computes asynchronous cache buffering stream progress lines natively
                if(video.buffered.length > 0) {
                    const bufferedRatio = video.buffered.end(video.buffered.length - 1) / video.duration;
                    bufferedIndicator.style.width = `${bufferedRatio * 100}%`;
                }
            });

            // Handle manual scrubbing click skips straight across progress timeline rail slider
            timelineRail.addEventListener('click', (e) => {
                const rect = timelineRail.getBoundingClientRect();
                const clickPositionRatio = (e.clientX - rect.left) / rect.width;
                video.currentTime = clickPositionRatio * video.duration;
            });

            // 4. STEP BACK AND ADVANCED SKIP COMMAND TRACK HANDLERS (10s Intervals)
            skipBackBtn.addEventListener('click', () => video.currentTime -= 10);
            skipForwardBtn.addEventListener('click', () => video.currentTime += 10);

            // 5. VOLUME MIXER CONSOLE SLIDER TRACK SLIDERS CONTROLS
            volumeSlider.addEventListener('input', (e) => {
                video.volume = e.target.value;
                if(video.volume == 0) {
                    muteBtn.innerHTML = '<i class="bi bi-volume-mute-fill text-xl"></i>';
                } else if(video.volume < 0.5) {
                    muteBtn.innerHTML = '<i class="bi bi-volume-down-fill text-xl"></i>';
                } else {
                    muteBtn.innerHTML = '<i class="bi bi-volume-up-fill text-xl"></i>';
                }
            });

            // Handle direct single clicks targeting mute switch states toggles
            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                muteBtn.innerHTML = video.muted ? '<i class="bi bi-volume-mute-fill text-xl"></i>' : '<i class="bi bi-volume-up-fill text-xl"></i>';
                volumeSlider.value = video.muted ? 0 : video.volume;
            });

            // 6. FULLSCREEN EXPANSION GATES SEQUENCING CONTROLS
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    videoContainer.requestFullscreen().catch(err => console.error(err));
                    fullscreenBtn.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="bi bi-fullscreen"></i>';
                }
            });

            // 7. GEAR BUTTON POPUP SETTINGS MENU INTERACTION MANAGER
            gearBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Blocks body clicks from automatically firing close triggers immediately
                settingsMenu.classList.toggle('hidden');
                gearBtn.classList.toggle('rotate-45');
            });

            // Automatically hides open dropdown overlays when clicking off target player element containers
            document.addEventListener('click', () => {
                settingsMenu.classList.add('hidden');
                gearBtn.classList.remove('rotate-45');
            });

            // Playback rate adjustment button updates listener loop arrays mapping
            document.querySelectorAll('.speed-opt').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const speed = parseFloat(btn.getAttribute('data-speed'));
                    video.playbackRate = speed;

                    // Cleans out highlighted visual tracking classes across choice pools
                    document.querySelectorAll('.speed-opt').forEach(b => {
                        b.classList.remove('bg-red-600/20', 'text-red-400');
                        const check = b.querySelector('.bi-check-lg');
                        if (check) check.remove();
                    });

                    // Set highlighting active focus selection parameters live on target nodes
                    btn.classList.add('bg-red-600/20', 'text-red-400');
                    btn.innerHTML += ' <i class="bi bi-check-lg"></i>';
                });
            });
        });
    </script>
</body>
</html>
